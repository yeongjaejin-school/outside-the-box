<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outside-the-Box</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #game-window {
        position: relative;
        margin: 0 auto;
      }

      #game-canvas,
      #debug-canvas {
        position: absolute;
        top: 0;
        left: 0;
      }

      #debug-canvas {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game-window">
      <canvas id="game-canvas"></canvas>
      <canvas id="debug-canvas"></canvas>
    </div>

    <div id="stats" hidden></div>

    <script src="bundle.js"></script>
  </body>
</html>
