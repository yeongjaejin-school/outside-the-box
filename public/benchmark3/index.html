<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outside-the-Box - Benchmark 3</title>
    <link rel="icon" type="image/png" href="./assets/Logo.png" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111111;
      }

      #main {
        width: 100vw;
        height: 100vh;
      }

      #game-window {
        position: relative;
        width: 100vw;
        height: 100vh;
        margin: 0;
        top: 0;
        left: 0;
      }

      #game-canvas,
      #text-canvas,
      #debug-canvas {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
      }

      #debug-canvas {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <div id="game-window">
        <canvas id="game-canvas"></canvas>
        <canvas id="text-canvas"></canvas>
        <canvas id="debug-canvas"></canvas>
      </div>

      <div id="stats" hidden>
        <canvas id="stats-canvas"></canvas>
        <select name="Display" id="chart-option"></select>
        <div id="stats-display"></div>
      </div>
    </div>

    <script src="benchmark3.bundle.js"></script>
  </body>
</html>
